
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Passwordless login</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 95);
      --surface: oklch(100% 0.002 95);
      --fg: oklch(20% 0.018 70);
      --muted: oklch(48% 0.012 70);
      --border: oklch(90% 0.006 95);
      --accent: oklch(52% 0.10 28);
      --shadow: 0 16px 50px color-mix(in oklab, var(--fg) 8%, transparent);
      --font-display: "Iowan Old Style", "Charter", Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
    }

    body {
      padding: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      width: 100%;
      background:
        radial-gradient(circle at top right, color-mix(in oklab, var(--accent) 8%, transparent), transparent 32%),
        var(--bg);
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.1rem);
      font-weight: 400;
      line-height: 0.96;
      letter-spacing: -0.03em;
      text-wrap: pretty;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      text-wrap: pretty;
    }

    .content {
      min-height: 100vh;
      width: min(100%, 560px);
      margin: 0 auto;
      padding: clamp(28px, 6vw, 72px) clamp(20px, 5vw, 40px);
      display: grid;
      align-content: center;
    }

    .panel {
      display: grid;
      gap: 20px;
    }

    .panel-head {
      display: grid;
      gap: 8px;
    }

    .brand-mark {
      margin: 0;
      color: var(--muted);
      font: 600 11px/1.2 var(--font-mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .form {
      display: grid;
      gap: 18px;
    }

    .field-group {
      display: grid;
      gap: 10px;
    }

    .field-label {
      color: var(--muted);
      font: 600 11px/1.2 var(--font-mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .text-input {
      min-height: 56px;
      width: 100%;
      padding: 0 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      border-radius: 0;
    }

    .text-input::placeholder {
      color: color-mix(in oklab, var(--muted) 80%, white);
    }

    .text-input:focus-visible,
    .button:focus-visible {
      outline: 2px solid color-mix(in oklab, var(--accent) 55%, white);
      outline-offset: 3px;
    }

    .field-help,
    .error-text {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .field-help {
      color: var(--muted);
    }

    .error-text {
      display: none;
      color: var(--accent);
    }

    .error-text.visible {
      display: block;
    }

    .button-row {
      display: flex;
      justify-content: stretch;
      gap: 12px;
      padding-top: 4px;
    }

    .button {
      min-height: 46px;
      padding: 0 20px;
      border: 1px solid var(--fg);
      background: transparent;
      color: var(--fg);
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .button:hover:not(:disabled),
    .button:focus-visible:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .button-primary {
      background: var(--fg);
      color: var(--surface);
    }

    .button-primary:hover:not(:disabled),
    .button-primary:focus-visible:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--surface);
    }

    .button-row .button {
      min-width: 180px;
      justify-content: center;
    }

    @media (max-width: 540px) {
      .content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .button-row .button {
        width: 100%;
        min-width: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="content">
      <section class="panel" aria-labelledby="login-title">
        <div class="panel-head">
          <p class="brand-mark">Candidate tracker</p>
          <h1 id="login-title">Sign in with a one-time code</h1>
        </div>
        <p class="panel-copy">Enter the email address or phone number linked to your account. We’ll send a one-time code on the next step.</p>

        <form class="form" id="loginForm" action="./passwordless-otp.html" method="get" novalidate>
          <div class="field-group">
            <label class="field-label" for="identityInput">Email or phone</label>
            <input
              class="text-input"
              id="identityInput"
              name="identity"
              type="text"
              inputmode="email"
              autocomplete="username"
              placeholder="Continue with email/phone"
              aria-describedby="identityHelp identityError"
              required
            >
            <p class="field-help" id="identityHelp">Accepted formats: a full email address or a phone number with 10 digits.</p>
            <p class="error-text" id="identityError" role="alert">Enter a valid email or phone number to continue.</p>
          </div>

          <div class="button-row">
            <button class="button button-primary" id="continueButton" type="submit" disabled>Continue</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "candidateTrackerAuthIdentity";
    const identityInput = document.getElementById("identityInput");
    const identityError = document.getElementById("identityError");
    const continueButton = document.getElementById("continueButton");
    const loginForm = document.getElementById("loginForm");

    function isValidIdentity(value) {
      const trimmed = value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const digitCount = trimmed.replace(/\D/g, "").length;
      return emailPattern.test(trimmed) || digitCount >= 10;
    }

    function updateFormState() {
      const valid = isValidIdentity(identityInput.value);
      continueButton.disabled = !valid;
      identityError.classList.toggle("visible", identityInput.value.trim() !== "" && !valid);
      identityInput.setAttribute("aria-invalid", String(identityInput.value.trim() !== "" && !valid));
    }

    function proceedToOtp() {
      const identity = identityInput.value.trim();
      if (!isValidIdentity(identity)) {
        updateFormState();
        identityInput.focus();
        return;
      }

      try {
        sessionStorage.setItem(STORAGE_KEY, identity);
      } catch (error) {
        // Ignore storage failures and continue with query-param handoff.
      }

      const nextUrl = new URL("./passwordless-otp.html", window.location.href);
      nextUrl.searchParams.set("identity", identity);
      window.location.href = nextUrl.toString();
    }

    try {
      const savedIdentity = sessionStorage.getItem(STORAGE_KEY);
      if (savedIdentity) {
        identityInput.value = savedIdentity;
      }
    } catch (error) {
      // Intentionally ignore storage failures; the form still works with query params.
    }

    updateFormState();

    identityInput.addEventListener("input", updateFormState);
    continueButton.addEventListener("click", (event) => {
      event.preventDefault();
      proceedToOtp();
    });

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      proceedToOtp();
    });
  </script>
</body>
</html>
