<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTP verification</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 95);
      --surface: oklch(100% 0.002 95);
      --fg: oklch(20% 0.018 70);
      --muted: oklch(48% 0.012 70);
      --border: oklch(90% 0.006 95);
      --accent: oklch(52% 0.10 28);
      --success: oklch(58% 0.11 145);
      --font-display: "Iowan Old Style", "Charter", Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
    }

    body {
      padding: 0;
    }

    button,
    input,
    a {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      width: 100%;
      background:
        radial-gradient(circle at top right, color-mix(in oklab, var(--accent) 8%, transparent), transparent 32%),
        var(--bg);
    }

    .content {
      min-height: 100vh;
      width: min(100%, 560px);
      margin: 0 auto;
      padding: clamp(28px, 6vw, 72px) clamp(20px, 5vw, 40px);
      display: grid;
      align-content: center;
    }

    .panel {
      display: grid;
      gap: 20px;
    }

    .quiet-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      color: var(--fg);
      text-decoration: none;
      font: 600 11px/1.2 var(--font-mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .quiet-link:hover,
    .quiet-link:focus-visible {
      color: var(--accent);
    }

    .quiet-link:focus-visible,
    .otp-input:focus-visible,
    .button:focus-visible {
      outline: 2px solid color-mix(in oklab, var(--accent) 55%, white);
      outline-offset: 3px;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.1rem);
      font-weight: 400;
      line-height: 0.96;
      letter-spacing: -0.03em;
      text-wrap: pretty;
    }

    .intro,
    .destination,
    .helper,
    .error-text,
    .success-text {
      margin: 0;
      line-height: 1.7;
    }

    .intro,
    .destination,
    .helper {
      color: var(--muted);
    }

    .destination strong {
      color: var(--fg);
      font-weight: 600;
    }

    .otp-form {
      display: grid;
      gap: 18px;
    }

    .otp-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .otp-input {
      height: 64px;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      text-align: center;
      font-size: 1.5rem;
      font-variant-numeric: tabular-nums;
      border-radius: 0;
    }

    .error-text,
    .success-text {
      display: none;
      font-size: 0.95rem;
    }

    .error-text {
      color: var(--accent);
    }

    .success-text {
      color: var(--success);
    }

    .error-text.visible,
    .success-text.visible {
      display: block;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: stretch;
    }

    .button {
      min-height: 46px;
      padding: 0 20px;
      border: 1px solid var(--fg);
      background: transparent;
      color: var(--fg);
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .button:hover:not(:disabled),
    .button:focus-visible:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .button-primary {
      background: var(--fg);
      color: var(--surface);
    }

    .button-primary:hover:not(:disabled),
    .button-primary:focus-visible:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--surface);
    }

    .button-row .button {
      min-width: 180px;
      justify-content: center;
    }

    .resend-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px 20px;
      padding-top: 2px;
    }

    .countdown-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 640px) {
      .otp-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 540px) {
      .content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .button-row .button {
        width: 100%;
        min-width: 0;
      }

      .resend-row {
      align-items: stretch;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="content">
      <section class="panel" aria-labelledby="otp-title">
        <a class="quiet-link" href="./passwordless-login.html">
          <span aria-hidden="true">&lt;</span>
          <span>Back to sign in</span>
        </a>

        <div>
          <h1 id="otp-title">Enter your code</h1>
        </div>

        <p class="intro" id="otpCopy">Enter the six-digit code to continue.</p>
        <p class="destination">Code sent to <strong id="destinationValue">No email or phone selected yet.</strong></p>

        <form class="otp-form" id="otpForm" novalidate>
          <div class="otp-grid" id="otpGrid" aria-label="One-time password digits">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 2">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 3">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 4">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 5">
            <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 6">
          </div>

          <p class="error-text" id="otpError" role="alert">Incorrect code.</p>

          <div class="button-row">
            <button class="button button-primary" id="verifyButton" type="button" disabled>Verify code</button>
          </div>

          <div class="resend-row">
            <p class="countdown-text" id="countdownText" aria-live="polite"></p>
            <button class="button" id="resendButton" type="button">Resend code</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    const TRACKER_URL = "./job-applications-tracker.html";
    const DEMO_OTP = "111111";
    const params = new URLSearchParams(window.location.search);
    const destinationValue = document.getElementById("destinationValue");
    const otpCopy = document.getElementById("otpCopy");
    const otpForm = document.getElementById("otpForm");
    const otpInputs = Array.from(document.querySelectorAll(".otp-input"));
    const verifyButton = document.getElementById("verifyButton");
    const resendButton = document.getElementById("resendButton");
    const countdownText = document.getElementById("countdownText");
    const otpError = document.getElementById("otpError");
    const RESEND_DELAY_SECONDS = 60;
    let resendRemaining = 0;
    let resendTimerId = null;

    function getIdentity() {
      const direct = params.get("identity");
      return direct || "";
    }

    function maskIdentity(identity) {
      if (!identity) {
        return "No email or phone selected yet.";
      }
      if (identity.includes("@")) {
        const parts = identity.split("@");
        const name = parts[0];
        const domain = parts[1];
        const visible = name.slice(0, 2);
        return visible + "•••@" + domain;
      }
      const digits = identity.replace(/\D/g, "");
      if (digits.length >= 4) {
        return "••• •• " + digits.slice(-4);
      }
      return identity;
    }

    function currentCode() {
      return otpInputs.map((input) => input.value).join("");
    }

    function proceedToTracker() {
      const nextUrl = new URL(TRACKER_URL, window.location.href).toString();
      window.location.href = nextUrl;
    }

    function updateVerifyState() {
      const ready = /^\d{6}$/.test(currentCode());
      verifyButton.disabled = !ready;
      if (ready) {
        otpError.classList.remove("visible");
      }
    }

    function formatCountdown(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ":" + String(seconds).padStart(2, "0");
    }

    function updateResendState() {
      if (!identity) {
        resendButton.disabled = true;
        countdownText.textContent = "Go back and enter an email or phone number to receive a code.";
        return;
      }

      const ready = resendRemaining <= 0;
      resendButton.disabled = !ready;
      countdownText.textContent = ready
        ? "You can resend the code now."
        : "You can resend the code in " + formatCountdown(resendRemaining) + ".";
    }

    function stopResendCountdown() {
      if (resendTimerId) {
        window.clearInterval(resendTimerId);
        resendTimerId = null;
      }
    }

    function startResendCountdown(seconds) {
      stopResendCountdown();
      resendRemaining = seconds;
      updateResendState();

      if (seconds <= 0) {
        return;
      }

      resendTimerId = window.setInterval(() => {
        resendRemaining -= 1;
        if (resendRemaining <= 0) {
          resendRemaining = 0;
          stopResendCountdown();
        }
        updateResendState();
      }, 1000);
    }

    const identity = getIdentity();
    const maskedIdentity = maskIdentity(identity);
    destinationValue.textContent = maskedIdentity;
    otpCopy.textContent = identity
      ? "We sent a one-time code to " + maskedIdentity + ". Enter the six digits below."
      : "Go back and enter an email or phone number first.";

    otpInputs.forEach((input, index) => {
      input.addEventListener("input", (event) => {
        input.value = event.target.value.replace(/\D/g, "").slice(0, 1);
        if (input.value && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
          otpInputs[index + 1].select();
        }
        updateVerifyState();
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Backspace" && !input.value && index > 0) {
          otpInputs[index - 1].focus();
          otpInputs[index - 1].value = "";
          updateVerifyState();
        }
      });

      input.addEventListener("paste", (event) => {
        event.preventDefault();
        const pasted = (event.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0, 6);
        if (!pasted) {
          return;
        }
        otpInputs.forEach((field, fieldIndex) => {
          field.value = pasted[fieldIndex] || "";
        });
        const lastFilledIndex = Math.min(pasted.length, otpInputs.length) - 1;
        otpInputs[Math.max(lastFilledIndex, 0)].focus();
        updateVerifyState();
      });
    });

    function handleVerifySubmit(event) {
      event.preventDefault();
      const code = currentCode();
      if (!/^\d{6}$/.test(code)) {
        otpError.classList.add("visible");
        otpInputs.find((input) => !input.value)?.focus();
        return false;
      }

      if (code !== DEMO_OTP) {
        otpError.classList.add("visible");
        otpError.textContent = "Incorrect code.";
        verifyButton.disabled = false;
        otpInputs[0].focus();
        otpInputs[0].select();
        return false;
      }

      otpError.textContent = "Incorrect code.";
      otpError.classList.remove("visible");
      verifyButton.disabled = true;
      verifyButton.textContent = "Opening applications…";
      proceedToTracker();
      return false;
    }

    verifyButton.addEventListener("click", handleVerifySubmit);
    otpForm.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleVerifySubmit(event);
      }
    });

    resendButton.addEventListener("click", () => {
      if (resendRemaining > 0) {
        return;
      }
      otpError.classList.remove("visible");
      otpInputs.forEach((input) => {
        input.value = "";
      });
      updateVerifyState();
      otpInputs[0].focus();
      startResendCountdown(RESEND_DELAY_SECONDS);
    });

    if (!identity) {
      updateResendState();
    } else {
      startResendCountdown(RESEND_DELAY_SECONDS);
    }

    otpInputs[0].focus();
    updateVerifyState();
  </script>
</body>
</html>
